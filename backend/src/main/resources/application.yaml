spring:
  application:
    name: backend

  config:
    import: optional:file:.env[.properties]

  datasource:
    url: jdbc:mysql://localhost:3306/cafe_study?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  sql:
    init:
      mode: always

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        show_sql: true
    defer-datasource-initialization: true

  # ==================================================
  # [추가된 영역 시작] Spring Security + OAuth2 설정
  # 카카오 로그인 기능을 위한 설정 블록
  # ==================================================
  security:
    oauth2:
      client:

        # ----------------------------------------------
        # [추가] 우리 서비스가 카카오 로그인을 사용할 때 필요한 클라이언트 정보
        # ----------------------------------------------
        registration:
          kakao:
            client-id: ${CLIENT_ID}   # 카카오 개발자 사이트 REST API 키
            authorization-grant-type: authorization_code
            redirect-uri: "http://localhost:8080/api/V1/auth/oauth/kakao/callback"
            client-name: Kakao

            # 로그인 후 사용자에게 동의받을 정보 범위
            scope:
              - profile_nickname
              - profile_image

        # ----------------------------------------------
        # [추가] 카카오 서버의 OAuth2 주소 정보
        # Spring Security가 자동으로 사용함
        # ----------------------------------------------
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize   # 로그인 페이지
            token-uri: https://kauth.kakao.com/oauth/token               # 토큰 발급 API
            user-info-uri: https://kapi.kakao.com/v2/user/me             # 사용자 정보 조회 API
            user-name-attribute: id

  # ==================================================
  # [추가된 영역 끝]
  # ==================================================

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 1800000
  refresh-token-expiration: 604800000

server:
  port: 8080